<svg xmlns="http://www.w3.org/2000/svg"
    width="48"
    height="48"
    viewBox="0 0 24 24"
    fill="none"
    stroke="currentColor"
    stroke-width="1.8"
    stroke-linecap="round"
    stroke-linejoin="round">

    <!-- ID card / license -->
    <rect x="5" y="5" width="14" height="14" rx="2" />

    <!-- Photo placeholder -->
    <circle cx="9" cy="10" r="1.5" />
    <path d="M7.5 13c1-1 3-1 4 0" />

    <!-- License lines -->
    <path d="M12.5 9h4" />
    <path d="M12.5 12h4" />
    <path d="M12.5 15h3" />

    <!-- Medical cross (fitness) -->
    <path d="M9 16v3" />
    <path d="M7.5 17.5h3" />

    <!-- Checkmark (approved to drive) -->
    <path d="M13 17l1 1 3-3" />
</svg>
